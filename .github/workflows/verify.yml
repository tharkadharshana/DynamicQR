name: System Validation CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      # Optional: if you use a real firestore emulator, you could add it here.
      # But since we use the live Firebase project (Project ID: gen-lang-client-0169684835),
      # we need valid credentials.

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "APP_URL=http://localhost:3000" >> .env
          echo "PORT=3000" >> .env
          echo "NODE_ENV=test" >> .env
          echo "INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}" >> .env
          echo "HASH_SALT=${{ secrets.HASH_SALT }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
          echo "LOG_LEVEL=info" >> .env

      - name: Create firebase-applet-config.json
        run: |
          echo '${{ secrets.FIREBASE_CONFIG_JSON }}' > firebase-applet-config.json

      - name: Authenticate with Google Cloud
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}"

      - name: Start Server
        run: npm run dev &
        env:
          NODE_ENV: test

      - name: Wait for server to be ready
        run: |
          until curl -s http://localhost:3000/api/health; do
            echo "Waiting for server..."
            sleep 2
          done

      - name: Run E2E Tests
        run: npx tsx test_e2e.ts
