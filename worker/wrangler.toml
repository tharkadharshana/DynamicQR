name = "dynamicqr-redirect"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV Namespaces — create these with:
#   wrangler kv:namespace create QR_KV
#   wrangler kv:namespace create QR_KV --preview
# Then paste the IDs below

# kv_namespaces = [
#   { binding = "QR_KV", id = "YOUR_KV_NAMESPACE_ID", preview_id = "YOUR_PREVIEW_KV_ID" }
# ]

# Environment variables — set via:
#   wrangler secret put API_URL
#   wrangler secret put INTERNAL_SECRET
# [vars]
# API_URL = "https://your-cloud-run-url.run.app"

# Routes — configure in Cloudflare dashboard or here:
# routes = [
#   { pattern = "scnr.app/*", zone_name = "scnr.app" }
# ]
