name = "dynamic-qr-worker"
main = "worker.js"
compatibility_date = "2024-03-21"

# KV Namespace bindings
# To get your ID:
# 1. Create a KV namespace in the Cloudflare Dashboard (Workers & Pages > KV).
# 2. Copy the ID and paste it below.
[[kv_namespaces]]
binding = "QR_CACHE"
id = "f3238e1d104e4f59a85850f237edb9f8"

[vars]
# The base URL of your Cloud Run API server
API_URL = "https://your-cloud-run-url.a.run.app"

# --- SECRETS (Do NOT commit to git) ---
# Set these using the wrangler CLI:
# 1. wrangler secret put INTERNAL_SECRET
# 2. wrangler secret put HASH_SALT
